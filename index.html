  <!-- Start button + audio + fade-out logic -->
  <script>
    const audio = document.getElementById("introMusic");
    const btn = document.getElementById("startButton");
    const startScreen = document.getElementById("startScreen");

    // Button starts disabled
    btn.style.pointerEvents = "none";
    btn.style.opacity = "0.5";

    // When game.js is ready, enable the button
window.addEventListener("assets-loaded", () => {
  btn.textContent = "Play";
  btn.style.pointerEvents = "auto";
  btn.style.opacity = "1";
});


    // Click to start game
btn.addEventListener("click", () => {
  audio.play();

  // Tell game.js to start
  window.dispatchEvent(new Event("start-game"));

  startScreen.style.opacity = "0";
  startScreen.style.pointerEvents = "none";

  setTimeout(() => {
    startScreen.style.display = "none";
  }, 600);
});
// Button starts disabled
btn.style.pointerEvents = "none";
btn.style.opacity = "0.5";
btn.textContent = "Loading...";   // ensure correct initial state

// When game.js is ready, enable the button
window.addEventListener("game-loaded", () => {
  btn.textContent = "Play";       // <-- change label here
  btn.style.pointerEvents = "auto";
  btn.style.opacity = "1";
  btn.classList.add("ready");
  document.getElementById('startButton').innerHTML = '<img src="img/startbutton.png" alt="Start" style="width: 100%; height: auto;">';
});
  </script>

<script>const musicToggle = document.getElementById('music-toggle');
const nextSong = document.getElementById('next-song');

// Toggle music
musicToggle.addEventListener('click', () => {
  if (typeof window.toggleMusic === 'function') {
    const muted = window.toggleMusic();

    musicToggle.src = muted
      ? 'img/musicoff.png'
      : 'img/musicon.png';
  }
});

// Next song
nextSong.addEventListener('click', () => {
  if (typeof window.changeSong === 'function') {
    window.changeSong();
  }
});
const sizeSlider = document.getElementById("sizeSlider");

sizeSlider.addEventListener("input", () => {
  drumScaleMultiplier = sizeSlider.value / 100;

  if (typeof updateAllDrumSizes === "function") {
    updateAllDrumSizes();
  }
});
drums.forEach(drum => {
  const newScale = drum.baseScale * drumScaleMultiplier;

  drum.width = drum.originalImage.width * newScale;
  drum.height = drum.originalImage.height * newScale;

  drum.hitWidth = drum.width * 0.8;
  drum.hitHeight = drum.height * 0.8;
});

canvas.addEventListener("pointerdown", (e) => {
  const { x, y } = getPointerPos(e);

  spawnDrum(x, y);
});

window.addEventListener("resize", () => {
  alert("Screen Orientation Changed");
});



</script>
